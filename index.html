<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TFC Anvil Calculator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <form id="calculator" class="anvil-window" autocomplete="off">
          <div class="anvil-title">Anvil</div>

          <div class="anvil-rules">
            <div class="rule-cap">Final rules</div>
            <div id="rules" class="rules-grid"></div>
          </div>

          <div class="anvil-body">
            <label class="item-slot current-slot">
              <span>現在値</span>
              <input id="current" type="number" min="0" max="150" step="1" value="0">
            </label>

            <label class="item-slot target-slot">
              <span>目標値</span>
              <input id="target" type="number" min="0" max="150" step="1" value="68">
            </label>
          </div>

          <div class="range-wrap anvil-gauge" aria-label="進捗バー">
            <div class="range-labels">
              <span style="--pos: 0%">0</span>
              <span style="--pos: 13.3333%">20</span>
              <span style="--pos: 26.6667%">40</span>
              <span style="--pos: 40%">60</span>
              <span style="--pos: 53.3333%">80</span>
              <span style="--pos: 66.6667%">100</span>
              <span style="--pos: 80%">120</span>
              <span style="--pos: 93.3333%">140</span>
            </div>
            <div class="range-track" role="group" aria-label="現在値と目標値">
              <div id="current-marker" class="marker current" title="現在値" role="slider" aria-label="現在値" aria-valuemin="0" aria-valuemax="150" tabindex="0"></div>
              <div id="target-marker" class="marker target" title="目標値" role="slider" aria-label="目標値" aria-valuemin="0" aria-valuemax="150" tabindex="0"></div>
            </div>
          </div>

          <div class="actions-row">
            <button type="button" id="clear-rules" class="secondary">ルールを消す</button>
          </div>
        </form>

        <div class="result-wrap">
          <input id="screenshot-title" class="result-title-field" type="text" placeholder="文字列を入力">
          <section class="panel result-panel" aria-live="polite">
            <div class="result-head">
              <div>
                <p class="eyebrow">Result</p>
                <h2 id="result-title">計算待ち</h2>
              </div>
              <div id="step-count" class="step-count">0 手</div>
            </div>
            <ol id="sequence" class="sequence"></ol>
          </section>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
